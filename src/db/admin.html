<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Booking Admin</title>
    <link rel="icon" href="data:," />
    <style>
      :root{
        --bg:#0b1020;
        --card:#121a33;
        --muted:#8fa0c6;
        --text:#eaf0ff;
        --line:#22305a;
        --accent:#6ea8fe;
        --danger:#ff5c7a;
        --ok:#38d9a9;
      }
      body{ margin:0; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background:linear-gradient(180deg,#070b16, #0b1020); color:var(--text); }
      a{ color:var(--accent); }
      .wrap{ max-width:1100px; margin:0 auto; padding:18px; }
      .topbar{ display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
      .title{ font-size:20px; font-weight:700; }
      .pill{ font-size:12px; color:var(--muted); border:1px solid var(--line); border-radius:999px; padding:6px 10px; }
      .grid{ display:grid; grid-template-columns: 1fr; gap:14px; margin-top:14px; }
      @media(min-width:980px){ .grid{ grid-template-columns: 1.15fr .85fr; } }
      .card{ background:rgba(18,26,51,.9); border:1px solid var(--line); border-radius:14px; padding:14px; box-shadow: 0 10px 30px rgba(0,0,0,.25); }
      .card h3{ margin:0 0 10px 0; font-size:14px; letter-spacing:.3px; color:#cfe0ff; }
      .row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
      input, select, button{
        background:#0c1330; color:var(--text); border:1px solid var(--line);
        padding:10px 10px; border-radius:10px; outline:none;
      }
      input::placeholder{ color:#5f70a3; }
      button{ cursor:pointer; background:rgba(110,168,254,.15); border-color:rgba(110,168,254,.35); }
      button:hover{ background:rgba(110,168,254,.22); }
      .btn-danger{ background:rgba(255,92,122,.14); border-color:rgba(255,92,122,.35); }
      .btn-danger:hover{ background:rgba(255,92,122,.22); }
      .btn-ok{ background:rgba(56,217,169,.12); border-color:rgba(56,217,169,.35); }
      .btn-ok:hover{ background:rgba(56,217,169,.2); }
      .muted{ color:var(--muted); font-size:12px; }
      .msg{ margin-top:8px; font-size:12px; }
      .msg.err{ color:var(--danger); }
      .msg.ok{ color:var(--ok); }

      table{ width:100%; border-collapse:collapse; margin-top:10px; }
      th, td{ border-bottom:1px solid var(--line); padding:10px 6px; font-size:13px; text-align:left; }
      th{ color:#cfe0ff; font-weight:600; }
      .tag{ font-size:12px; padding:4px 8px; border:1px solid var(--line); border-radius:999px; color:var(--muted); }

      .calendar{ margin-top:12px; display:grid; grid-template-columns: 92px 1fr; gap:8px; }
      .slot{ border:1px solid var(--line); background:#0c1330; border-radius:10px; padding:8px; min-height:26px; display:flex; align-items:center; }
      .booked{ background:rgba(255,92,122,.12); border-color:rgba(255,92,122,.35); }
      .timecell{ color:var(--muted); font-size:12px; display:flex; align-items:center; justify-content:flex-end; padding-right:6px; }

      .two{ display:grid; grid-template-columns:1fr; gap:12px; }
      @media(min-width:700px){ .two{ grid-template-columns: 1fr 1fr; } }

      .hr-grid{ display:grid; grid-template-columns: 130px 1fr 1fr; gap:8px; align-items:center; margin-top:10px; }
      .hr-grid .head{ color:#cfe0ff; font-size:12px; font-weight:600; }
      .hr-row{ display:contents; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="topbar">
        <div class="title">Admin Dashboard</div>
        <div class="pill">Local • <span id="apiBase"></span></div>
      </div>

      <div class="grid">
        <div class="card">
          <h3>Bookings & Day Calendar</h3>
          <div class="row">
            <label class="muted">Date</label>
            <input id="date" type="date" />
            <label class="muted">Staff</label>
            <select id="bookStaff"></select>
            <button class="btn-ok" id="refreshBtn">Refresh</button>
            <span class="muted">Status defaults to <span class="tag">confirmed</span></span>
          </div>

          <table>
            <thead>
              <tr>
                <th>Start</th><th>End</th><th>Service</th><th>Staff</th><th>Customer</th><th>Phone</th><th></th>
              </tr>
            </thead>
            <tbody id="bookRows"></tbody>
          </table>

          <h3 style="margin-top:14px;">Day Calendar</h3>
          <div id="cal" class="calendar"></div>
        </div>

        <div class="card">
          <h3>Manage Staff & Services</h3>

          <div class="two">
            <div class="card" style="padding:12px;">
              <h3>Staff</h3>
              <div class="row">
                <input id="newStaffName" placeholder="New staff name" />
                <button class="btn-ok" id="addStaffBtn">Add</button>
              </div>
              <div id="staffAddMsg" class="msg"></div>

              <table>
                <thead>
                  <tr><th>Name</th><th>Active</th><th></th></tr>
                </thead>
                <tbody id="staffRows"></tbody>
              </table>
            </div>

            <div class="card" style="padding:12px;">
              <h3>Services</h3>
              <div class="row">
                <input id="newSvcName" placeholder="Service name" />
                <input id="newSvcDur" type="number" min="1" placeholder="Minutes" style="width:110px;" />
                <input id="newSvcPrice" type="number" min="0" placeholder="Price $" style="width:110px;" />
                <button class="btn-ok" id="addSvcBtn">Add</button>
              </div>
              <div id="svcAddMsg" class="msg"></div>

              <table>
                <thead>
                  <tr><th>Name</th><th>Min</th><th>Price</th><th></th></tr>
                </thead>
                <tbody id="svcRows"></tbody>
              </table>
            </div>
          </div>

          <div class="card" style="padding:12px; margin-top:12px;">
            <h3>Working Hours</h3>
            <div class="row">
              <label class="muted">Staff</label>
              <select id="hoursStaff"></select>
              <button id="loadHoursBtn">Load</button>
              <button class="btn-ok" id="saveHoursBtn">Save</button>
              <span class="muted">Tip: set blank to remove hours</span>
            </div>

            <div class="hr-grid" style="margin-top:10px;">
              <div class="head">Day</div>
              <div class="head">Start</div>
              <div class="head">End</div>

              <div class="hr-row">
                <div class="muted">Sun</div><input id="d0s" type="time"><input id="d0e" type="time">
              </div>
              <div class="hr-row">
                <div class="muted">Mon</div><input id="d1s" type="time"><input id="d1e" type="time">
              </div>
              <div class="hr-row">
                <div class="muted">Tue</div><input id="d2s" type="time"><input id="d2e" type="time">
              </div>
              <div class="hr-row">
                <div class="muted">Wed</div><input id="d3s" type="time"><input id="d3e" type="time">
              </div>
              <div class="hr-row">
                <div class="muted">Thu</div><input id="d4s" type="time"><input id="d4e" type="time">
              </div>
              <div class="hr-row">
                <div class="muted">Fri</div><input id="d5s" type="time"><input id="d5e" type="time">
              </div>
              <div class="hr-row">
                <div class="muted">Sat</div><input id="d6s" type="time"><input id="d6e" type="time">
              </div>
            </div>

            <div id="hoursMsg" class="msg"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const ADMIN_KEY = prompt("Enter admin key:");
      const API = location.origin;
      document.getElementById("apiBase").textContent = API;

      const $ = (id) => document.getElementById(id);

      function setMsg(id, text, type){
        const el = $(id);
        el.className = "msg " + (type || "");
        el.textContent = text || "";
      }

      async function fetchJSON(url, opts = {}) {
        opts.headers = {
          ...(opts.headers || {}),
          "X-Admin-Key": ADMIN_KEY
        };

        const res = await fetch(url, opts);
        const txt = await res.text();
        let data = null;
        try { data = txt ? JSON.parse(txt) : null; } catch { data = txt; }

        if (!res.ok) {
          const msg = (data && data.error) ? data.error : ("HTTP " + res.status);
          throw new Error(msg);
        }
        return data;
      }

      function isoToLocalTime(iso) {
        const d = new Date(iso);
        return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      }

      let staffAll = [];
      let servicesAll = [];

      async function loadStaffAll(){
        staffAll = await fetchJSON(API + "/staff");

        const hoursSel = $("hoursStaff");
        hoursSel.innerHTML =
         `<option value="">Select staff...</option>` +
          staffAll.map(s => `<option value="${s.id}">${s.name}</option>`).join("");

        const bookSel = $("bookStaff");
        bookSel.innerHTML =
          `<option value="">(All Staff)</option>` +
          staffAll.map(s => `<option value="${s.id}">${s.name}</option>`).join("");

        const tbody = $("staffRows");
        tbody.innerHTML = staffAll.map(s => `
          <tr>
            <td>${s.name}</td>
            <td><span class="tag">active</span></td>
            <td style="text-align:right;">
              <button class="btn-danger" data-disable="${s.id}">Deactivate</button>
            </td>
          </tr>
        `).join("");

        tbody.querySelectorAll("[data-disable]").forEach(btn => {
          btn.addEventListener("click", async () => {
            const id = btn.getAttribute("data-disable");
            try{
              await fetchJSON(API + "/admin/staff/" + id, {
                method:"PUT",
                headers:{ "Content-Type":"application/json" },
                body: JSON.stringify({ active:false })
              });
              setMsg("staffAddMsg", "Staff deactivated", "ok");
              await boot();
            }catch(e){
              setMsg("staffAddMsg", e.message, "err");
            }
          });
        });
      }

      async function loadServicesAll(){
        servicesAll = await fetchJSON(API + "/services");
        const tbody = $("svcRows");
        tbody.innerHTML = servicesAll.map(s => {
          const price = (s.price_cents || 0) / 100;
          return `
            <tr>
              <td><input data-svc-name="${s.id}" value="${s.name}" /></td>
              <td><input data-svc-dur="${s.id}" type="number" min="1" value="${s.duration_minutes}" style="width:90px;"></td>
              <td><input data-svc-price="${s.id}" type="number" min="0" step="0.01" value="${price.toFixed(2)}" style="width:100px;"></td>
              <td style="text-align:right;">
                <button class="btn-ok" data-svc-save="${s.id}">Save</button>
              </td>
            </tr>
          `;
        }).join("");

        tbody.querySelectorAll("[data-svc-save]").forEach(btn => {
          btn.addEventListener("click", async () => {
            const id = btn.getAttribute("data-svc-save");
            const name = document.querySelector(`[data-svc-name="${id}"]`).value.trim();
            const duration_minutes = Number(document.querySelector(`[data-svc-dur="${id}"]`).value);
            const price = Number(document.querySelector(`[data-svc-price="${id}"]`).value || 0);
            const price_cents = Math.round(price * 100);

            try{
              await fetchJSON(API + "/admin/services/" + id, {
                method:"PUT",
                headers:{ "Content-Type":"application/json" },
                body: JSON.stringify({ name, duration_minutes, price_cents })
              });
              setMsg("svcAddMsg", "Service updated", "ok");
              await loadServicesAll();
            }catch(e){
              setMsg("svcAddMsg", e.message, "err");
            }
          });
        });
      }

      async function loadBookings(){
        const date = $("date").value;
        const staff_id = $("bookStaff").value;

        const url = new URL(API + "/bookings");
        url.searchParams.set("date", date);
        if (staff_id) url.searchParams.set("staff_id", staff_id);

        const bookings = await fetchJSON(url);

        const tbody = $("bookRows");
        tbody.innerHTML = bookings.map(b => `
          <tr>
            <td>${isoToLocalTime(b.start_time)}</td>
            <td>${isoToLocalTime(b.end_time)}</td>
            <td>${b.service_name}</td>
            <td>${b.staff_name}</td>
            <td>${b.customer_name}</td>
            <td>${b.customer_phone || ""}</td>
            <td style="text-align:right;">
              <button class="btn-danger" data-cancel="${b.id}">Cancel</button>
            </td>
          </tr>
        `).join("");

        tbody.querySelectorAll("[data-cancel]").forEach(btn => {
          btn.addEventListener("click", async () => {
            const id = btn.getAttribute("data-cancel");
            try{
              await fetchJSON(API + "/admin/bookings/" + id, { method:"DELETE" });
              await refreshBookingsAndCal();
            }catch(e){
              alert(e.message);
            }
          });
        });

        return bookings;
      }

      function buildCalendar(bookings){
        const cal = $("cal");
        cal.innerHTML = "";

        const date = $("date").value;
        if (!date) return;

        const start = new Date(date + "T09:00:00");
        const end = new Date(date + "T17:00:00");

        for (let t = new Date(start); t < end; t = new Date(t.getTime() + 15*60000)) {
          const label = t.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
          const slotStart = t;
          const slotEnd = new Date(t.getTime() + 15*60000);

          const hit = bookings.find(b => {
            const bs = new Date(b.start_time);
            const be = new Date(b.end_time);
            return bs < slotEnd && be > slotStart;
          });

          const timeCell = document.createElement("div");
          timeCell.className = "timecell";
          timeCell.textContent = label;

          const slotCell = document.createElement("div");
          slotCell.className = "slot" + (hit ? " booked" : "");
          slotCell.textContent = hit ? `${hit.service_name} • ${hit.customer_name} (${hit.staff_name})` : "";

          cal.appendChild(timeCell);
          cal.appendChild(slotCell);
        }
      }

      async function refreshBookingsAndCal(){
        const bookings = await loadBookings();
        buildCalendar(bookings);
      }

      async function addStaff(){
        const name = $("newStaffName").value.trim();
        if (!name) return setMsg("staffAddMsg","Name required","err");

        try{
          await fetchJSON(API + "/admin/staff", {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({ name })
          });
          $("newStaffName").value = "";
          setMsg("staffAddMsg","Staff added","ok");
          await boot();
        }catch(e){
          setMsg("staffAddMsg", e.message, "err");
        }
      }

      async function addService(){
        const name = $("newSvcName").value.trim();
        const duration_minutes = Number($("newSvcDur").value);
        const price = Number($("newSvcPrice").value || 0);
        const price_cents = Math.round(price * 100);

        if (!name || !duration_minutes) return setMsg("svcAddMsg","Name + minutes required","err");

        try{
          await fetchJSON(API + "/admin/services", {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({ name, duration_minutes, price_cents })
          });
          $("newSvcName").value = "";
          $("newSvcDur").value = "";
          $("newSvcPrice").value = "";
          setMsg("svcAddMsg","Service added","ok");
          await loadServicesAll();
        }catch(e){
          setMsg("svcAddMsg", e.message, "err");
        }
      }

      function clearHoursInputs(){
        for (let d=0; d<=6; d++){
          $("d"+d+"s").value = "";
          $("d"+d+"e").value = "";
        }
      }

      async function loadHours(){
        const staffId = $("hoursStaff").value;
        if (!staffId) return setMsg("hoursMsg","Select staff first","err");

        clearHoursInputs();
        setMsg("hoursMsg","Loading...","");

        try{
          const rows = await fetchJSON(API + "/admin/staff/" + staffId + "/availability");
          for (const r of rows){
            const d = Number(r.day_of_week);
            $("d"+d+"s").value = (r.start_time || "").slice(0,5);
            $("d"+d+"e").value = (r.end_time || "").slice(0,5);
          }
          setMsg("hoursMsg","Loaded","ok");
        }catch(e){
          setMsg("hoursMsg", e.message, "err");
        }
      }

      async function saveHours(){
        const staffId = $("hoursStaff").value;
        if (!staffId) return setMsg("hoursMsg","Select staff first","err");

        const payload = [];
        for (let d=0; d<=6; d++){
          const start_time = $("d"+d+"s").value;
          const end_time = $("d"+d+"e").value;
          if (start_time && end_time){
            payload.push({ day_of_week:d, start_time, end_time });
          }
        }

        try{
          await fetchJSON(API + "/admin/staff/" + staffId + "/availability", {
            method:"PUT",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify(payload)
          });
          setMsg("hoursMsg","Saved working hours","ok");
        }catch(e){
          setMsg("hoursMsg", e.message, "err");
        }
      }

      async function boot(){
        await loadStaffAll();
        await loadServicesAll();
        await refreshBookingsAndCal();
      }

      (function init(){
        const d = new Date();
        $("date").value = d.toISOString().slice(0,10);

        $("refreshBtn").addEventListener("click", refreshBookingsAndCal);
        $("addStaffBtn").addEventListener("click", addStaff);
        $("addSvcBtn").addEventListener("click", addService);
        $("loadHoursBtn").addEventListener("click", loadHours);
        $("saveHoursBtn").addEventListener("click", saveHours);

        boot();
      })();
    </script>
  </body>
</html>
